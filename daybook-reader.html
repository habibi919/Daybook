<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daybook Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400;1,6..72,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4EFE7; --card:#FCFAF5;
    --ink:#2A2520; --ink-soft:#756B60; --ink-faint:#A89E90;
    --line:#E6DECF; --line-soft:#EFE9DD;
    --m-radiant:#E3A857; --m-good:#9DAE85; --m-steady:#C2A98C; --m-low:#88A0B4; --m-heavy:#A98AA0;
    --serif:'Newsreader','Iowan Old Style',Georgia,serif;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100vh;}
  body{
    background:var(--paper);color:var(--ink);font-family:var(--serif);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.5;
  }

  /* ---------- layout ---------- */
  .shell{max-width:720px;margin:0 auto;padding:0 24px 80px;}

  /* ---------- landing ---------- */
  #landing{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:40px 24px;gap:0;
  }
  .brand{font-family:var(--serif);font-weight:400;font-size:clamp(52px,10vw,88px);letter-spacing:-.03em;line-height:.95;margin:0 0 18px;}
  .brand em{font-style:italic;color:var(--ink-soft);}
  .sub{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 36px;}
  .lede{font-size:clamp(15px,2.4vw,18px);color:var(--ink-soft);max-width:38ch;line-height:1.55;margin:0 0 40px;}

  /* drop zone */
  .drop{
    border:1.5px dashed var(--line);border-radius:20px;padding:40px 32px;
    cursor:pointer;transition:border-color .2s, background .2s;max-width:380px;width:100%;
    display:flex;flex-direction:column;align-items:center;gap:14px;
    background:var(--card);
  }
  .drop:hover,.drop.over{border-color:var(--ink-soft);background:var(--paper);}
  .drop svg{width:32px;height:32px;color:var(--ink-faint);}
  .drop .dt{font-size:16px;color:var(--ink-soft);}
  .drop .ds{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);}
  .btn-open{
    display:inline-flex;align-items:center;gap:9px;
    background:var(--ink);color:#F7F2E9;border:none;border-radius:14px;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;
    padding:14px 24px;cursor:pointer;margin-top:6px;
  }
  .btn-open:hover{background:#1f1b16;}

  .mood-legend{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 6px;margin-top:32px;}
  .legend-item{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);padding:6px 12px 6px 8px;border-radius:999px;}
  .legend-item .dot{width:11px;height:11px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(42,37,32,.1);}
  .legend-item span{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);}

  /* ---------- reader ---------- */
  #reader{display:none;}

  .reader-header{
    position:sticky;top:0;z-index:10;
    background:rgba(244,239,231,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line-soft);
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 0;margin:0 -24px;padding-left:24px;padding-right:24px;
  }
  .reader-brand{font-family:var(--serif);font-weight:400;font-size:22px;letter-spacing:-.02em;}
  .reader-brand em{font-style:italic;color:var(--ink-soft);}
  .reader-meta{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);}
  .btn-reset{border:none;background:transparent;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);cursor:pointer;padding:6px 0;}
  .btn-reset:hover{color:var(--ink-soft);}

  /* search */
  .search-wrap{padding:22px 0 4px;}
  .search-field{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 16px;}
  .search-field svg{width:17px;height:17px;color:var(--ink-faint);flex:0 0 auto;}
  .search-field input{font-family:var(--serif);font-size:16px;color:var(--ink);background:transparent;border:none;outline:none;width:100%;}
  .search-field input::placeholder{color:var(--ink-faint);}

  /* filter bar */
  .filter-bar{display:flex;gap:8px;padding:14px 0 4px;flex-wrap:wrap;}
  .filter-chip{
    display:inline-flex;align-items:center;gap:6px;padding:5px 12px 5px 8px;
    border:1px solid var(--line);border-radius:999px;background:var(--card);
    font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-faint);cursor:pointer;transition:border-color .15s;
  }
  .filter-chip .dot{width:9px;height:9px;border-radius:50%;}
  .filter-chip:hover{border-color:var(--ink-faint);color:var(--ink-soft);}
  .filter-chip.active{border-color:var(--ink);color:var(--ink);background:var(--paper);}

  /* stats bar */
  .stats{display:flex;gap:22px;padding:6px 0 20px;flex-wrap:wrap;}
  .stat{display:flex;flex-direction:column;gap:3px;}
  .stat .n{font-size:28px;letter-spacing:-.02em;line-height:1;}
  .stat .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);}

  /* mood bar */
  .mood-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin:2px 0 24px;gap:2px;}
  .mood-seg{height:100%;border-radius:2px;transition:flex .4s ease;}

  /* month group */
  .month-group{margin-bottom:10px;}
  .month-label{
    font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ink-faint);padding:22px 0 10px;
    border-top:1px solid var(--line-soft);margin-top:6px;
  }
  .month-group:first-child .month-label{border-top:none;padding-top:4px;}

  /* entry card */
  .entry{
    display:grid;grid-template-columns:36px 1fr;gap:16px;
    padding:20px 0;border-top:1px solid var(--line-soft);cursor:pointer;
    transition:opacity .15s;
  }
  .entry:first-of-type{border-top:none;}
  .entry:hover{opacity:.82;}
  .entry.expanded{cursor:default;}
  .entry:hover.expanded{opacity:1;}
  .eswatch{width:36px;height:36px;border-radius:11px;box-shadow:inset 0 0 0 1px rgba(42,37,32,.08);flex:0 0 auto;margin-top:4px;}
  .emeta{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:3px;}
  .etitle{font-size:17px;letter-spacing:-.01em;margin:0 0 4px;line-height:1.35;}
  .esnip{font-size:14px;color:var(--ink-soft);line-height:1.45;margin:0;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .ebody{font-size:15.5px;line-height:1.65;margin:10px 0 0;color:#3a342d;white-space:pre-wrap;display:none;}
  .emore{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-top:8px;display:none;}
  .entry.expanded .esnip{display:none;}
  .entry.expanded .ebody{display:block;}
  .entry.expanded .emore{display:block;}

  /* empty */
  .no-results{padding:32px 0;font-size:15px;color:var(--ink-faint);font-style:italic;}

  /* error */
  .error-card{background:var(--card);border:1px solid #d4b8b4;border-radius:16px;padding:18px 22px;margin-top:16px;max-width:380px;}
  .error-card p{margin:0;font-size:14px;color:#9a4b3f;line-height:1.5;}

  @media (max-width: 520px){
    .stats{gap:16px;}
    .stat .n{font-size:22px;}
    .reader-header{padding:12px 16px;}
    .shell{padding:0 16px 60px;}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <h1 class="brand">Day<em>book</em></h1>
  <p class="sub">Backup reader</p>
  <p class="lede">Open a Daybook backup file to read your entries. Everything happens locally — nothing is uploaded anywhere.</p>

  <div class="drop" id="dropZone" role="button" tabindex="0" aria-label="Drop backup file here or click to browse">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/>
    </svg>
    <span class="dt">Drop your backup file here</span>
    <span class="ds">daybook-YYYY-MM-DD.json</span>
    <button class="btn-open" id="browseBtn" onclick="event.stopPropagation()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Open backup file
    </button>
  </div>
  <div id="landingError"></div>

  <div class="mood-legend" aria-label="Mood colors">
    <span class="legend-item"><i class="dot" style="background:var(--m-radiant)"></i><span>Radiant</span></span>
    <span class="legend-item"><i class="dot" style="background:var(--m-good)"></i><span>Good</span></span>
    <span class="legend-item"><i class="dot" style="background:var(--m-steady)"></i><span>Steady</span></span>
    <span class="legend-item"><i class="dot" style="background:var(--m-low)"></i><span>Low</span></span>
    <span class="legend-item"><i class="dot" style="background:var(--m-heavy)"></i><span>Heavy</span></span>
  </div>
</div>

<!-- READER -->
<div id="reader" style="display:none">
  <div class="reader-header">
    <div>
      <div class="reader-brand">Day<em>book</em></div>
      <div class="reader-meta" id="headerMeta"></div>
    </div>
    <button class="btn-reset" id="resetBtn">Open another file</button>
  </div>
  <div class="shell">
    <div class="search-wrap">
      <div class="search-field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="11" r="6.5"/><path d="M20 20l-3.6-3.6"/></svg>
        <input type="text" id="searchQ" placeholder="Search your pages…" autocomplete="off">
      </div>
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="stats" id="statsBar"></div>
    <div class="mood-bar" id="moodBar"></div>
    <div id="entriesOut"></div>
  </div>
</div>

<input type="file" id="fileInput" accept="application/json,.json" style="display:none">

<script>
(function(){
  'use strict';

  var MOODS = [
    {key:'radiant', label:'Radiant', color:'var(--m-radiant)'},
    {key:'good',    label:'Good',    color:'var(--m-good)'},
    {key:'steady',  label:'Steady',  color:'var(--m-steady)'},
    {key:'low',     label:'Low',     color:'var(--m-low)'},
    {key:'heavy',   label:'Heavy',   color:'var(--m-heavy)'}
  ];
  var MOOD_MAP = {}; MOODS.forEach(function(m){ MOOD_MAP[m.key]=m; });
  var MON_L=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var DOW_S=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function esc(s){ return (s||'').replace(/[&<>"']/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function pad(n){ return n<10?'0'+n:''+n; }
  function parseKey(k){ var p=k.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
  function wordCount(s){ s=(s||'').trim(); return s? s.split(/\s+/).length : 0; }

  var allEntries = [];
  var activeMoodFilter = null;

  /* ---------- file loading ---------- */
  document.getElementById('browseBtn').addEventListener('click', function(){ document.getElementById('fileInput').click(); });
  document.getElementById('dropZone').addEventListener('click', function(){ document.getElementById('fileInput').click(); });
  document.getElementById('dropZone').addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' ') document.getElementById('fileInput').click(); });
  document.getElementById('fileInput').addEventListener('change', function(){ if(this.files[0]) loadFile(this.files[0]); });

  var dz = document.getElementById('dropZone');
  ['dragenter','dragover'].forEach(function(ev){ dz.addEventListener(ev, function(e){ e.preventDefault(); dz.classList.add('over'); }); });
  ['dragleave','dragend'].forEach(function(ev){ dz.addEventListener(ev, function(){ dz.classList.remove('over'); }); });
  dz.addEventListener('drop', function(e){ e.preventDefault(); dz.classList.remove('over'); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

  function loadFile(file){
    if(!file.name.endsWith('.json') && file.type!=='application/json'){
      showLandingError('That doesn\u2019t look like a Daybook backup — open a .json file.'); return;
    }
    var r = new FileReader();
    r.onload = function(){
      try{ parseBackup(r.result); }
      catch(e){ showLandingError('This file couldn\u2019t be read. Make sure it\u2019s an unmodified Daybook backup.'); }
    };
    r.onerror = function(){ showLandingError('Something went wrong reading that file.'); };
    r.readAsText(file);
  }

  function parseBackup(text){
    var data = JSON.parse(text);
    var raw = data.entries || (typeof data==='object' ? data : null);
    if(!raw || typeof raw!=='object') throw new Error('no entries');
    var list = [];
    Object.keys(raw).forEach(function(k){
      var e = raw[k];
      if(!e) return;
      if(!e.date && /^\d{4}-\d{2}-\d{2}$/.test(k)) e.date = k;
      if(e.date) list.push(e);
    });
    if(!list.length) throw new Error('empty');
    list.sort(function(a,b){ return a.date<b.date?1:(a.date>b.date?-1:0); });
    allEntries = list;
    activeMoodFilter = null;
    showReader(data.exportedAt);
  }

  function showLandingError(msg){
    document.getElementById('landingError').innerHTML = '<div class="error-card"><p>'+esc(msg)+'</p></div>';
  }

  /* ---------- reader ---------- */
  function showReader(exportedAt){
    document.getElementById('landing').style.display = 'none';
    document.getElementById('reader').style.display = 'block';
    var meta = allEntries.length + (allEntries.length===1?' entry':' entries');
    if(exportedAt){ try{ var d=new Date(exportedAt); meta+=' · backed up '+d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }catch(e){} }
    document.getElementById('headerMeta').textContent = meta;
    buildFilters();
    renderAll();
    document.getElementById('searchQ').addEventListener('input', renderAll);
    document.getElementById('resetBtn').addEventListener('click', function(){ location.reload(); });
  }

  function buildFilters(){
    var bar = document.getElementById('filterBar');
    var counts = {};
    allEntries.forEach(function(e){ if(e.mood) counts[e.mood]=(counts[e.mood]||0)+1; });
    var html = '';
    MOODS.forEach(function(m){
      if(!counts[m.key]) return;
      html += '<button class="filter-chip" data-m="'+m.key+'"><i class="dot" style="background:'+m.color+'"></i>'+m.label+'&nbsp;('+counts[m.key]+')</button>';
    });
    bar.innerHTML = html;
    bar.querySelectorAll('.filter-chip').forEach(function(b){
      b.addEventListener('click', function(){
        var k = b.getAttribute('data-m');
        activeMoodFilter = (activeMoodFilter===k) ? null : k;
        bar.querySelectorAll('.filter-chip').forEach(function(x){ x.classList.toggle('active', x.getAttribute('data-m')===activeMoodFilter); });
        renderAll();
      });
    });
  }

  function filtered(){
    var q = document.getElementById('searchQ').value.trim().toLowerCase();
    return allEntries.filter(function(e){
      if(activeMoodFilter && e.mood!==activeMoodFilter) return false;
      if(!q) return true;
      var d = parseKey(e.date);
      var hay = ((e.title||'')+' '+(e.body||'')+' '+DOW_S[d.getDay()]+' '+MON_L[d.getMonth()]+' '+d.getFullYear()).toLowerCase();
      return hay.indexOf(q)>=0;
    });
  }

  function renderAll(){
    var list = filtered();
    renderStats(list);
    renderMoodBar(list);
    renderEntries(list);
  }

  function renderStats(list){
    var words = list.reduce(function(s,e){ return s+wordCount(e.body); }, 0);
    var months = {};
    list.forEach(function(e){ var d=parseKey(e.date); months[d.getFullYear()+'-'+d.getMonth()]=1; });
    var sb = document.getElementById('statsBar');
    sb.innerHTML =
      stat(list.length, list.length===1?'entry':'entries') +
      stat(words.toLocaleString(), words===1?'word':'words') +
      stat(Object.keys(months).length, Object.keys(months).length===1?'month':'months');
  }
  function stat(n,l){ return '<div class="stat"><span class="n">'+n+'</span><span class="l">'+l+'</span></div>'; }

  function renderMoodBar(list){
    if(!list.length){ document.getElementById('moodBar').innerHTML=''; return; }
    var counts={}; list.forEach(function(e){ if(e.mood) counts[e.mood]=(counts[e.mood]||0)+1; });
    var html='';
    MOODS.forEach(function(m){
      if(!counts[m.key]) return;
      var pct = (counts[m.key]/list.length*100).toFixed(1);
      html+='<div class="mood-seg" title="'+m.label+': '+counts[m.key]+'" style="background:'+m.color+';flex:'+pct+'"></div>';
    });
    document.getElementById('moodBar').innerHTML = html;
  }

  function renderEntries(list){
    var out = document.getElementById('entriesOut');
    if(!list.length){ out.innerHTML='<p class="no-results">No entries match.</p>'; return; }

    var byMonth = [];
    var monthMap = {};
    list.forEach(function(e){
      var d=parseKey(e.date), mk=MON_L[d.getMonth()]+' '+d.getFullYear();
      if(!monthMap[mk]){ monthMap[mk]=[]; byMonth.push({label:mk, entries:monthMap[mk]}); }
      monthMap[mk].push(e);
    });

    var html='';
    byMonth.forEach(function(group){
      html+='<div class="month-group"><div class="month-label">'+esc(group.label)+'</div>';
      group.entries.forEach(function(e,i){
        var d=parseKey(e.date);
        var m=MOOD_MAP[e.mood];
        var mcolor=m?m.color:'var(--ink-faint)';
        var title=(e.title&&e.title.trim())?e.title:'';
        var body=(e.body&&e.body.trim())?e.body:'';
        var snipSrc=title||body;
        var snip=snipSrc?snipSrc.replace(/\n/g,' ').slice(0,160):'No words for this day.';
        html+='<div class="entry'+(i===0?' first':'')+'" data-date="'+esc(e.date)+'">'+
          '<div class="eswatch" style="background:'+mcolor+'"></div>'+
          '<div>'+
            '<div class="emeta">'+DOW_S[d.getDay()]+' · '+d.getDate()+' '+MON_L[d.getMonth()]+'</div>'+
            (title?'<div class="etitle">'+esc(title)+'</div>':'')+
            '<p class="esnip'+(snipSrc?'':' muted')+'">'+esc(snip)+'</p>'+
            (body?'<div class="ebody">'+esc(body)+'</div>':'<div class="ebody" style="color:var(--ink-faint);font-style:italic">No words for this day.</div>')+
            (m?'<div class="emore">'+esc(m.label)+' · '+wordCount(body)+' words</div>':'')+
          '</div>'+
        '</div>';
      });
      html+='</div>';
    });
    out.innerHTML=html;

    // tap to expand / collapse
    out.querySelectorAll('.entry').forEach(function(el){
      el.addEventListener('click', function(){
        el.classList.toggle('expanded');
      });
    });
  }

})();
</script>
</body>
</html>
